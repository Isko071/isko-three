<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="background-img"></div>
    <div class="overlay"></div>
    
    <div class="form">
        <div class="header-name">
            <img src="image/logo/Logo.png" alt="" class="company-logo">
            <span class="company-name">Company Name</span>
        </div>
        <div class="login-card">
            <div class="login">
                <label for="login">Login</label>
                <input type="text" id="login" placeholder="user email">
            </div>

            <div class="login">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="password">
            </div>

            <button type="submit" class="button btn-submit">Submit</button>
        </div>
        <div class="or">Or</div>
        <div class="social-card">
            <button type="google" class="button btn-google" ><img src="image/logo/google.png" alt="" class="btn-social">Continue with Google</button>
            <button type="linkedin" class="button btn-linkedin"><img src="image/logo/linkedin.png" alt="" class="btn-social">Continue with LinkedIn</button>
            <button type="new-account" class="button btn-new"><img src="image/logo/new-account.png" alt="" class="btn-social">Create new account</button>
        </div>
        <a href="#" class="privacy-link">Privacy policy</a>
    </div>
</body>
</html>
